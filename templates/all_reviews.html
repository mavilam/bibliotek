{% extends "base.html" %}

{% block title %}{{ title }} — Bibliotek{% endblock %}

{% block meta %}
    <meta name="description" content="Reseñas de libros leídos por Miguel Ávila Monroy">
    <meta property="og:title" content="{{ title }} — Bibliotek">
    <meta property="og:description" content="Reseñas de libros leídos por Miguel Ávila Monroy">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ title }} — Bibliotek">
    <meta name="twitter:description" content="Reseñas de libros leídos por Miguel Ávila Monroy">
    <meta name="twitter:image" content="{{ base_url }}/assets/card.png">
{% endblock %}

{% block body %}
    <style>
        .search-wrap {
            margin: 1.25rem 0 1.5rem;
        }

        #book-search {
            width: 100%;
            padding: 0.5em 0.75em;
            background: var(--bg-surface);
            border: 1px solid var(--tag-bg);
            border-radius: 4px;
            color: var(--txt-white);
            font-family: inherit;
            font-size: var(--txt-small);
            outline: none;
            transition: border-color 0.15s;
        }

        #book-search::placeholder {
            color: var(--txt-muted);
        }

        #book-search:focus {
            border-color: var(--txt-accent);
        }

        .year-heading {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: baseline;
            gap: 0.45em;
        }

        .year-heading::before {
            content: '▾';
            font-size: 0.85em;
            color: var(--txt-muted);
            transition: transform 0.15s;
            display: inline-block;
            width: 0.9em;
        }

        .year-group.collapsed .year-heading::before {
            transform: rotate(-90deg);
        }

        .year-group.collapsed .book-list {
            display: none;
        }

        .year-group {
            margin-bottom: 0.5rem;
        }

        #no-results {
            color: var(--txt-muted);
            font-style: italic;
            font-size: var(--txt-small);
            display: none;
            margin-top: 0.5rem;
        }
    </style>

    <main>
        <nav class="homie"><a href="{{ base_url }}/index.html">inicio</a></nav>
        <section class="section-block">
            <h1>{{ title }}</h1>

            <div class="search-wrap">
                <input
                    type="search"
                    id="book-search"
                    placeholder="buscar por título o autor"
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>

            <p id="no-results">ningún resultado</p>

            {% for group in dir_reviews %}
            <div class="year-group">
                <h2 class="year-heading">{{ group[0] }}</h2>
                <div class="book-list">
                    {% for review in group[1] %}
                    <figure class="book-item">
                        <span class="book-title"><a href="./{{ review.path }}">{{ review.title }}</a></span>
                        <span class="book-author">por {{ review.author }}</span>
                        <span class="book-date">{{ review.date_read }}</span>
                    </figure>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </section>
    </main>

    <script>
        (function () {
            const groups = Array.from(document.querySelectorAll('.year-group'));
            const searchInput = document.getElementById('book-search');
            const noResults = document.getElementById('no-results');

            // collapse all groups except the first on page load
            groups.forEach(function (g, i) {
                if (i !== 0) g.classList.add('collapsed');
            });

            // toggle a group when its heading is clicked
            groups.forEach(function (g) {
                g.querySelector('.year-heading').addEventListener('click', function () {
                    g.classList.toggle('collapsed');
                });
            });

            // search handler
            searchInput.addEventListener('input', function () {
                const query = searchInput.value.trim().toLowerCase();
                let totalVisible = 0;

                groups.forEach(function (g) {
                    const items = Array.from(g.querySelectorAll('.book-item'));
                    let groupVisible = 0;

                    items.forEach(function (item) {
                        if (query === '') {
                            item.style.display = '';
                            groupVisible++;
                        } else {
                            const title = item.querySelector('.book-title').textContent.toLowerCase();
                            const author = item.querySelector('.book-author').textContent.toLowerCase();
                            const match = title.includes(query) || author.includes(query);
                            item.style.display = match ? '' : 'none';
                            if (match) groupVisible++;
                        }
                    });

                    if (query === '') {
                        // restore default: only first group expanded
                        g.style.display = '';
                        const isFirst = groups.indexOf(g) === 0;
                        if (isFirst) {
                            g.classList.remove('collapsed');
                        } else {
                            g.classList.add('collapsed');
                        }
                    } else if (groupVisible > 0) {
                        g.style.display = '';
                        g.classList.remove('collapsed'); // auto-expand groups with results
                    } else {
                        g.style.display = 'none';
                    }

                    totalVisible += groupVisible;
                });

                noResults.style.display = (query !== '' && totalVisible === 0) ? 'block' : 'none';
            });
        })();
    </script>
{% endblock %}
