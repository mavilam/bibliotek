<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Reseña</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor/dist/index.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        
        body {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: -apple-system, system-ui, sans-serif;
            font-size: 14px;
        }

        #app { display: flex; height: 100vh; width: 100vw; }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            padding: 24px;
            border-right: 1px solid #333;
            overflow-y: auto;
            transition: margin-left 0.2s, opacity 0.2s;
            background: #1e1e1e;
        }
        .sidebar.hidden { margin-left: -260px; opacity: 0; pointer-events: none; }

        .sidebar input, .sidebar select {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
            background: #2d2d2d;
            border: 1px solid #404040;
            border-radius: 4px;
            color: #d4d4d4;
            font: inherit;
        }
        .sidebar input:focus, .sidebar select:focus { outline: none; border-color: #666; }
        .sidebar label { display: block; color: #808080; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; }

        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }

        .rating { display: flex; gap: 4px; margin-bottom: 16px; }
        .rating button {
            flex: 1; padding: 8px 0; background: #2d2d2d; border: 1px solid #404040;
            border-radius: 4px; color: #808080; cursor: pointer; font: inherit;
        }
        .rating button:hover { border-color: #666; color: #d4d4d4; }
        .rating button.on { background: #d4d4d4; color: #1e1e1e; border-color: #d4d4d4; }

        .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .tags input[type="checkbox"] { display: none; }
        .tags label {
            padding: 4px 10px; border: 1px solid #404040; border-radius: 4px;
            color: #808080; cursor: pointer; font-size: 12px; text-transform: none; background: #2d2d2d;
        }
        .tags label:hover { border-color: #666; }
        .tags input:checked + label { background: #d4d4d4; color: #1e1e1e; border-color: #d4d4d4; }

        .custom-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .custom-tag {
            padding: 4px 10px; background: #2d2d2d; border-radius: 4px;
            font-size: 12px; display: inline-flex; align-items: center; gap: 6px;
        }
        .custom-tag button { background: none; border: none; color: #808080; cursor: pointer; font-size: 14px; }
        .custom-tag button:hover { color: #d4d4d4; }

        .add-tag { display: flex; gap: 4px; margin-bottom: 16px; }
        .add-tag input { flex: 1; margin: 0; }
        .add-tag button {
            padding: 0 12px; background: #2d2d2d; border: 1px solid #404040;
            border-radius: 4px; color: #808080; cursor: pointer; font: inherit;
        }
        .add-tag button:hover { border-color: #666; color: #d4d4d4; }

        .save {
            width: 100%; padding: 12px; background: #d4d4d4; border: none;
            border-radius: 4px; color: #1e1e1e; font: inherit; font-weight: 500; cursor: pointer;
        }
        .save:hover { background: #fff; }

        .msg { padding: 8px; margin-bottom: 12px; border-radius: 4px; font-size: 12px; display: none; }
        .msg.ok { display: block; background: #1e3a1e; color: #8f8; }
        .msg.err { display: block; background: #3a1e1e; color: #f88; }

        .editor { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #1e1e1e; }

        .editor-header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 32px; border-bottom: 1px solid #333;
        }

        .toggle-btn {
            width: 32px; height: 32px; background: #2d2d2d; border: 1px solid #404040;
            border-radius: 4px; color: #808080; cursor: pointer; font-size: 16px; flex-shrink: 0;
        }
        .toggle-btn:hover { border-color: #666; color: #d4d4d4; }

        .title-input {
            flex: 1; background: transparent; border: none; color: #d4d4d4;
            font-size: 24px; font-weight: 300; min-width: 0;
        }
        .title-input:focus { outline: none; }
        .title-input::placeholder { color: #555; }

        .editor-body { flex: 1; overflow: hidden; }

        #vditor { height: 100%; }

        .vditor { border: none !important; }
        .vditor-ir { background: #1e1e1e !important; }
        .vditor-ir pre.vditor-reset { background: #1e1e1e !important; color: #d4d4d4 !important; padding: 24px 32px !important; }
        .vditor-toolbar { display: none !important; }
        .vditor-reset { font-family: -apple-system, system-ui, sans-serif !important; font-size: 16px !important; line-height: 1.8 !important; }
        .vditor-reset blockquote { border-left: 3px solid #555 !important; color: #999 !important; }
        .vditor-reset h1, .vditor-reset h2, .vditor-reset h3 { color: #fff !important; }
        .vditor-reset a { color: #6cb6ff !important; }
        .vditor-reset code { background: #2d2d2d !important; }
        .vditor-reset pre { background: #2d2d2d !important; }
        .vditor-ir__node--expand .vditor-ir__marker { color: #666 !important; }

        @media (max-width: 600px) {
            .sidebar { width: 100%; position: fixed; top: 0; left: 0; height: 100%; z-index: 10; }
            .sidebar.hidden { margin-left: -100%; }
            .editor-header { padding: 16px; }
            .vditor-ir pre.vditor-reset { padding: 16px !important; }
        }
    </style>
</head>
<body>
<form id="f">
    <div id="app">
        <aside class="sidebar" id="sidebar">
            <div id="msg" class="msg"></div>

            <label>Autor</label>
            <input type="text" id="author" required placeholder="Autor">

            <div class="row">
                <div><label>Año</label><input type="number" id="year" placeholder="Año"></div>
                <div><label>Páginas</label><input type="number" id="pages" placeholder="Pág"></div>
            </div>

            <div class="row">
                <div><label>Leído</label><input type="date" id="date" required value="{{ today }}"></div>
                <div><label>Carpeta</label><select id="folder">{{ folders_options }}</select></div>
            </div>

            <label>Puntuación</label>
            <div class="rating">
                <button type="button" data-r="0">–</button>
                <button type="button" data-r="1">1</button>
                <button type="button" data-r="2">2</button>
                <button type="button" data-r="3">3</button>
                <button type="button" data-r="4">4</button>
                <button type="button" data-r="5">5</button>
            </div>
            <input type="hidden" id="rating" value="0">

            <label>Etiquetas</label>
            <div class="tags">
                <input type="checkbox" id="t1" value="novela"><label for="t1">novela</label>
                <input type="checkbox" id="t2" value="cómic"><label for="t2">cómic</label>
                <input type="checkbox" id="t3" value="poesía"><label for="t3">poesía</label>
                <input type="checkbox" id="t4" value="relatos"><label for="t4">relatos</label>
                <input type="checkbox" id="t5" value="no ficción"><label for="t5">no ficción</label>
            </div>
            <div id="ctags" class="custom-tags"></div>
            <div class="add-tag">
                <input type="text" id="newtag" placeholder="+ etiqueta">
                <button type="button" id="addtag">+</button>
            </div>

            <button type="submit" class="save">Guardar</button>
        </aside>

        <main class="editor">
            <header class="editor-header">
                <button type="button" class="toggle-btn" id="toggle">☰</button>
                <input type="text" id="title" class="title-input" required placeholder="Título">
            </header>
            <div class="editor-body">
                <div id="vditor"></div>
            </div>
        </main>
    </div>
</form>

<script src="https://cdn.jsdelivr.net/npm/vditor/dist/index.min.js"></script>
<script>
const ct = new Set();

const vditor = new Vditor('vditor', {
    mode: 'ir',
    theme: 'dark',
    placeholder: 'Escribe tu reseña...',
    toolbar: [],
    height: '100%',
    cache: { enable: true, id: 'bibliotek-review' },
    preview: { theme: { current: 'dark' } }
});

document.getElementById('toggle').onclick = () => {
    document.getElementById('sidebar').classList.toggle('hidden');
};

document.querySelectorAll('.rating button').forEach(b => {
    b.onclick = () => {
        document.querySelectorAll('.rating button').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        document.getElementById('rating').value = b.dataset.r;
    };
});

function renderCt() {
    const c = document.getElementById('ctags');
    c.innerHTML = '';
    ct.forEach(t => {
        const s = document.createElement('span');
        s.className = 'custom-tag';
        s.innerHTML = `${t}<button type="button" data-t="${t}">&times;</button>`;
        c.appendChild(s);
    });
    c.querySelectorAll('button').forEach(b => b.onclick = () => { ct.delete(b.dataset.t); renderCt(); });
}

document.getElementById('addtag').onclick = () => {
    const i = document.getElementById('newtag');
    const t = i.value.trim().toLowerCase();
    if (t && !ct.has(t)) { ct.add(t); renderCt(); i.value = ''; }
};
document.getElementById('newtag').onkeypress = e => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('addtag').click(); }};

document.getElementById('f').onsubmit = async e => {
    e.preventDefault();
    const tags = [...document.querySelectorAll('.tags input:checked')].map(x => x.value).concat([...ct]);
    const data = {
        title: document.getElementById('title').value,
        author: document.getElementById('author').value,
        year_published: parseInt(document.getElementById('year').value) || 0,
        date_read: document.getElementById('date').value,
        rating: parseInt(document.getElementById('rating').value),
        pages: parseInt(document.getElementById('pages').value) || 0,
        tags,
        review_text: vditor.getValue(),
        folder: document.getElementById('folder').value
    };
    try {
        const r = await fetch('/api/save', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
        const j = await r.json();
        const m = document.getElementById('msg');
        if (r.ok) {
            m.textContent = 'Guardado: ' + j.filename;
            m.className = 'msg ok';
            document.getElementById('f').reset();
            document.querySelectorAll('.rating button').forEach(x => x.classList.remove('on'));
            ct.clear(); renderCt();
            vditor.setValue('');
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            setTimeout(() => m.className = 'msg', 3000);
        } else {
            m.textContent = j.error;
            m.className = 'msg err';
        }
    } catch (err) {
        const m = document.getElementById('msg');
        m.textContent = err.message;
        m.className = 'msg err';
    }
};
</script>
</body>
</html>
